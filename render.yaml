services:
  - type: web
    name: skill-gap-backend
    runtime: python
    buildCommand: pip install -r skill-gap-agent/backend/requirements.txt
    startCommand: cd skill-gap-agent/backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
